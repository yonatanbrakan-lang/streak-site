<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Screen Time UI</title>
    <style>
        :root {
            --ios-bg: #f2f2f7;
            --ios-blue: #007aff;
            --ios-gray: #8e8e93;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--ios-bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        .iphone-screen {
            width: 100%;
            max-width: 400px;
            height: 100%;
            background: white;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 60px;
        }

        /* עמוד הזנת קוד */
        #passcode-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .title {
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 25px;
        }

        .dots-container {
            display: flex;
            gap: 20px;
            margin-bottom: 50px;
        }

        .dot {
            width: 12px;
            height: 12px;
            border: 1px solid black;
            border-radius: 50%;
        }

        .dot.filled {
            background-color: black;
        }

        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px 30px;
            justify-items: center;
        }

        .key {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            background-color: #e5e5ea;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: background 0.2s;
        }

        .key:active {
            background-color: #d1d1d6;
        }

        .key span:first-child {
            font-size: 30px;
            color: black;
        }

        .key span:last-child {
            font-size: 10px;
            letter-spacing: 2px;
            font-weight: bold;
        }

        /* עמוד בחירת זמן */
        #options-page {
            display: none;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.4);
            position: absolute;
            bottom: 0;
            justify-content: flex-end;
            flex-direction: column;
        }

        .action-sheet {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            margin: 10px;
            border-radius: 14px;
            overflow: hidden;
        }

        .option-btn {
            width: 100%;
            padding: 18px;
            border: none;
            background: none;
            font-size: 20px;
            color: var(--ios-blue);
            border-bottom: 0.5px solid #c6c6c8;
            cursor: pointer;
            text-align: center;
        }

        .option-btn:last-child {
            border-bottom: none;
        }

        .cancel-btn {
            background: white;
            margin: 10px;
            margin-top: 0;
            border-radius: 14px;
            padding: 18px;
            color: var(--ios-blue);
            font-weight: 600;
            text-align: center;
            font-size: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="iphone-screen">
    
    <div id="passcode-page">
        <div class="title">הזן קוד זמן מסך</div>
        <div class="dots-container" id="dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>

        <div class="keypad">
            <div class="key" onclick="pressKey(1)"><span>1</span><span>&nbsp;</span></div>
            <div class="key" onclick="pressKey(2)"><span>2</span><span>ABC</span></div>
            <div class="key" onclick="pressKey(3)"><span>3</span><span>DEF</span></div>
            <div class="key" onclick="pressKey(4)"><span>4</span><span>GHI</span></div>
            <div class="key" onclick="pressKey(5)"><span>5</span><span>JKL</span></div>
            <div class="key" onclick="pressKey(6)"><span>6</span><span>MNO</span></div>
            <div class="key" onclick="pressKey(7)"><span>7</span><span>PQRS</span></div>
            <div class="key" onclick="pressKey(8)"><span>8</span><span>TUV</span></div>
            <div class="key" onclick="pressKey(9)"><span>9</span><span>WXYZ</span></div>
            <div style="width:75px"></div>
            <div class="key" onclick="pressKey(0)"><span>0</span><span>&nbsp;</span></div>
            <div style="width:75px; display: flex; align-items: center; justify-content: center; font-size: 16px;" onclick="reset()">ביטול</div>
        </div>
    </div>

    <div id="options-page">
        <div class="action-sheet">
            <button class="option-btn">אשר למשך 15 דקות</button>
            <button class="option-btn">אשר לשעה אחת</button>
            <button class="option-btn">אשר לכל היום</button>
        </div>
        <div class="cancel-btn" onclick="location.reload()">ביטול</div>
    </div>

</div>

<script>
    let code = "";
    const dots = document.querySelectorAll('.dot');

    function pressKey(num) {
        if (code.length < 4) {
            code += num;
            dots[code.length - 1].classList.add('filled');
            
            if (code.length === 4) {
                setTimeout(() => {
                    document.getElementById('passcode-page').style.display = 'none';
                    document.getElementById('options-page').style.display = 'flex';
                }, 200);
            }
        }
    }

    function reset() {
        code = "";
        dots.forEach(dot => dot.classList.remove('filled'));
    }
</script>

</body>
</html>
