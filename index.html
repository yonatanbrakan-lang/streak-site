<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iOS Screen Time Interface</title>
    <style>
        /* הגדרות כלליות למראה iOS */
        :root {
            --ios-bg: #f2f2f7;
            --ios-blue: #007aff;
            --ios-gray: #8e8e93;
            --text-color: #000000;
        }

        body, html {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
            background-color: var(--ios-bg);
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            -webkit-font-smoothing: antialiased;
            -webkit-user-select: none;
            user-select: none;
        }

        /* מכולת האייפון */
        .iphone-container {
            width: 100%;
            max-width: 375px;
            height: 100%;
            max-height: 812px;
            background-color: #fff;
            border-radius: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* סרגל המצב העליון */
        .status-bar {
            height: 44px;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            font-weight: 600;
            position: absolute;
            top: 0;
            width: 100%;
            box-sizing: border-box;
            z-index: 10;
        }

        /* שורת הכפתור התחתון */
        .home-bar {
            height: 34px;
            width: 100%;
            position: absolute;
            bottom: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        .home-bar::after {
            content: '';
            width: 134px;
            height: 5px;
            background-color: #000;
            border-radius: 2.5px;
        }

        /* עמודים - הגדרות משותפות */
        .page {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            transition: transform 0.4s ease-out, opacity 0.3s;
        }

        /* עמוד 1: הזנת קוד */
        #passcode-page {
            padding: 60px 20px 0;
            align-items: center;
            z-index: 3;
        }

        .close-btn {
            position: absolute;
            top: 60px;
            right: 20px;
            width: 30px;
            height: 30px;
            background-color: #f2f2f7;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }
        .close-btn::before, .close-btn::after {
            content: '';
            position: absolute;
            width: 14px;
            height: 2px;
            background-color: #000;
        }
        .close-btn::before { transform: rotate(45deg); }
        .close-btn::after { transform: rotate(-45deg); }

        .passcode-title {
            font-size: 17px;
            font-weight: 400;
            text-align: center;
            margin-top: 100px;
            margin-bottom: 25px;
        }

        .dots-container {
            display: flex;
            gap: 15px;
            direction: ltr;
        }
        .dot {
            width: 13px;
            height: 13px;
            border: 1px solid #000;
            border-radius: 50%;
        }
        .dot.filled { background-color: #000; }

        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: auto;
            margin-bottom: 60px;
            width: 100%;
            max-width: 280px;
        }
        .key {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            background-color: #e5e5ea;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }
        .key:active { background-color: #d1d1d6; }
        .key-num { font-size: 32px; color: #000; }
        .key-letters { font-size: 10px; letter-spacing: 2px; font-weight: 700; color: #000; margin-top: -3px; }

        /* עמוד 2: בחירת זמן */
        #time-options-page {
            background-color: var(--ios-bg);
            align-items: center;
            justify-content: center;
            transform: translateX(100%);
            z-index: 2;
        }

        .hourglass-icon {
            width: 50px;
            height: 80px;
            position: relative;
            margin-bottom: 30px;
        }
        .hourglass-icon::before, .hourglass-icon::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 50%;
            border: 4px solid var(--ios-blue);
            box-sizing: border-box;
        }
        .hourglass-icon::before { top: 0; border-radius: 25px 25px 5px 5px; border-bottom: none; }
        .hourglass-icon::after { bottom: 0; border-radius: 5px 5px 25px 25px; border-top: none; }
        
        .time-limit-title { font-size: 28px; font-weight: 700; margin-bottom: 10px; }
        .time-limit-sub { font-size: 17px; color: var(--ios-gray); margin-bottom: 40px; }

        .options-list {
            width: 100%;
            background-color: #fff;
            border-top: 0.5px solid #c6c6c8;
            border-bottom: 0.5px solid #c6c6c8;
        }
        .option-item {
            padding: 15px 20px;
            font-size: 17px;
            color: var(--ios-blue);
            border-bottom: 0.5px solid #c6c6c8;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .option-item:last-child { border-bottom: none; }
        .option-item:active { background-color: #e5e5ea; }

        /* עמוד 3: תוצאה סופית */
        #summary-page {
            background-color: #fff;
            align-items: center;
            justify-content: center;
            transform: translateX(100%);
            z-index: 1;
            padding: 20px;
            text-align: center;
        }

        .summary-card {
            background: #f9f9f9;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            width: 80%;
        }

        .summary-label { font-size: 14px; color: var(--ios-gray); margin-top: 15px; }
        .summary-value { font-size: 24px; font-weight: 700; color: var(--ios-blue); margin-bottom: 5px; }

        .restart-btn {
            margin-top: 30px;
            color: var(--ios-blue);
            font-weight: 600;
            cursor: pointer;
        }

        /* אנימציות */
        .active { transform: translateX(0) !important; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
    </style>
</head>
<body>

<div class="iphone-container">
    <div class="status-bar">
        <span>14:33</span>
        <span style="font-size: 12px;">📶 ⚡️ 21%</span>
    </div>

    <div id="passcode-page" class="page active">
        <div class="close-btn" onclick="resetAll()"></div>
        <div class="passcode-title">יש להזין את קוד הגישה עבור "זמן מסך"</div>
        <div class="dots-container" id="dots-wrap">
            <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
        <div class="keypad">
            <div class="key" onclick="pressKey(1)"><span class="key-num">1</span><span class="key-letters">&nbsp;</span></div>
            <div class="key" onclick="pressKey(2)"><span class="key-num">2</span><span class="key-letters">ABC</span></div>
            <div class="key" onclick="pressKey(3)"><span class="key-num">3</span><span class="key-letters">DEF</span></div>
            <div class="key" onclick="pressKey(4)"><span class="key-num">4</span><span class="key-letters">GHI</span></div>
            <div class="key" onclick="pressKey(5)"><span class="key-num">5</span><span class="key-letters">JKL</span></div>
            <div class="key" onclick="pressKey(6)"><span class="key-num">6</span><span class="key-letters">MNO</span></div>
            <div class="key" onclick="pressKey(7)"><span class="key-num">7</span><span class="key-letters">PQRS</span></div>
            <div class="key" onclick="pressKey(8)"><span class="key-num">8</span><span class="key-letters">TUV</span></div>
            <div class="key" onclick="pressKey(9)"><span class="key-num">9</span><span class="key-letters">WXYZ</span></div>
            <div style="width:75px"></div>
            <div class="key" onclick="pressKey(0)"><span class="key-num">0</span><span class="key-letters">&nbsp;</span></div>
            <div style="width:75px; display:flex; justify-content:center; align-items:center; color:var(--text-color); font-size:16px;" onclick="resetAll()">ביטול</div>
        </div>
    </div>

    <div id="time-options-page" class="page">
        <div class="hourglass-icon"></div>
        <div class="time-limit-title">הגבלת זמן</div>
        <div class="time-limit-sub">בחר כמה זמן נוסף ברצונך לאשר:</div>
        <div class="options-list">
            <div class="option-item" onclick="selectTime('15 דקות')">אשר ל-15 דקות</div>
            <div class="option-item" onclick="selectTime('שעה אחת')">אשר לשעה אחת</div>
            <div class="option-item" onclick="selectTime('כל היום')">אשר לכל היום</div>
        </div>
    </div>

    <div id="summary-page" class="page">
        <div class="summary-card">
            <div class="summary-label">הקוד שהוקלד:</div>
            <div class="summary-value" id="display-code">****</div>
            
            <div class="summary-label">זמן שנבחר:</div>
            <div class="summary-value" id="display-time">---</div>
        </div>
        <div class="restart-btn" onclick="resetAll()">התחל מחדש</div>
    </div>

    <div class="home-bar"></div>
</div>

<script>
    let currentPasscode = "";
    let selectedTime = "";
    const dots = document.querySelectorAll('.dot');
    
    function pressKey(num) {
        if (currentPasscode.length < 4) {
            currentPasscode += num;
            updateDots();
            if (currentPasscode.length === 4) {
                setTimeout(showTimeOptions, 300);
            }
        }
    }

    function updateDots() {
        dots.forEach((dot, i) => dot.classList.toggle('filled', i < currentPasscode.length));
    }

    function showTimeOptions() {
        document.getElementById('passcode-page').style.transform = "translateX(-100%)";
        document.getElementById('time-options-page').classList.add('active');
    }

    function selectTime(time) {
        selectedTime = time;
        document.getElementById('display-code').innerText = currentPasscode;
        document.getElementById('display-time').innerText = selectedTime;
        
        document.getElementById('time-options-page').style.transform = "translateX(-100%)";
        document.getElementById('summary-page').classList.add('active');
    }

    function resetAll() {
        currentPasscode = "";
        selectedTime = "";
        updateDots();
        
        // החזרת כל העמודים למצב התחלתי
        document.getElementById('passcode-page').style.transform = "translateX(0)";
        document.getElementById('time-options-page').style.transform = "translateX(100%)";
        document.getElementById('time-options-page').classList.remove('active');
        document.getElementById('summary-page').style.transform = "translateX(100%)";
        document.getElementById('summary-page').classList.remove('active');
    }
</script>
</body>
</html>
