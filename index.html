<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>זמן מסך</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    width: 100%; height: 100%;
    background: #f2f2f7;
    font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    overflow: hidden;
  }

  .screen {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: #f2f2f7;
    display: flex;
    flex-direction: column;
    align-items: center;
    transition: opacity 0.25s ease;
  }
  .screen.hidden { opacity: 0; pointer-events: none; }

  /* ===== SCREEN 1: PASSCODE ===== */
  #screen-passcode { justify-content: flex-start; }

  .close-btn {
    position: absolute;
    top: 20px;
    right: 20px;
    width: 36px; height: 36px;
    background: #e5e5ea;
    border-radius: 50%;
    border: none;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-size: 16px;
    color: #3c3c43;
    font-weight: 600;
    z-index: 10;
  }

  .passcode-title {
    font-size: 17px;
    font-weight: 500;
    color: #000;
    text-align: center;
    margin-top: 120px;
    margin-bottom: 40px;
    padding: 0 40px;
    direction: rtl;
    line-height: 1.5;
  }

  .passcode-dots {
    display: flex;
    gap: 20px;
    margin-bottom: 60px;
    justify-content: center;
  }

  .dot {
    width: 14px; height: 14px;
    border: 2px solid #8e8e93;
    border-radius: 50%;
    transition: all 0.12s ease;
  }
  .dot.filled {
    background: #000;
    border-color: #000;
    transform: scale(1.1);
  }

  .ios-keyboard {
    position: absolute;
    bottom: 0;
    left: 0; right: 0;
    background: #d1d1d6;
    padding: 10px 6px 20px;
  }

  .keyboard-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    padding: 0 6px;
  }

  .key-btn {
    height: 58px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: filter 0.08s;
    user-select: none;
  }
  .key-btn:active { filter: brightness(0.82); }
  .key-btn.num {
    background: #fff;
    box-shadow: 0 1px 0 rgba(0,0,0,0.3);
  }
  .key-num-inner { display: flex; flex-direction: column; align-items: center; }
  .key-number { font-size: 26px; font-weight: 300; color: #000; line-height: 1; }
  .key-letters { font-size: 9px; font-weight: 600; color: #000; letter-spacing: 1.5px; margin-top: 1px; }
  .key-btn.empty { background: transparent; box-shadow: none; cursor: default; }
  .key-btn.del { background: #adb5be; box-shadow: 0 1px 0 rgba(0,0,0,0.3); font-size: 22px; color: #000; }

  /* ===== SCREEN 2: OPTIONS ===== */
  #screen-options { justify-content: flex-start; }

  .options-header {
    margin-top: 80px;
    text-align: center;
    padding: 0 30px;
    direction: rtl;
  }
  .options-title { font-size: 22px; font-weight: 700; color: #000; margin-bottom: 10px; }
  .options-subtitle { font-size: 15px; color: #6c6c70; line-height: 1.4; }

  .time-options-list {
    width: calc(100% - 40px);
    background: #fff;
    border-radius: 12px;
    overflow: hidden;
    margin-top: 40px;
  }

  .time-option {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 15px 18px;
    border: none;
    background: transparent;
    width: 100%;
    cursor: pointer;
    font-family: -apple-system, 'SF Pro Display', sans-serif;
    font-size: 17px;
    color: #000;
    direction: rtl;
    text-align: right;
    transition: background 0.12s;
  }
  .time-option:not(:last-child) { border-bottom: 0.5px solid #c6c6c8; }
  .time-option:active { background: #f2f2f7; }

  .option-left { display: flex; align-items: center; gap: 14px; }
  .option-icon {
    width: 32px; height: 32px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 17px; color: #fff; flex-shrink: 0;
  }
  .option-icon.green { background: #34c759; }
  .option-icon.blue  { background: #007aff; }
  .option-icon.red   { background: #ff3b30; }
  .option-text { font-size: 17px; color: #000; }
  .option-time { font-size: 17px; color: #8e8e93; }

  /* ===== SCREEN 3: DONE ===== */
  #screen-done { justify-content: center; }

  .done-icon {
    width: 80px; height: 80px;
    background: #34c759;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 40px; color: #fff;
    margin-bottom: 24px;
    animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes popIn {
    0% { transform: scale(0); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  .done-title { font-size: 24px; font-weight: 700; color: #000; margin-bottom: 10px; direction: rtl; }
  .done-subtitle { font-size: 16px; color: #6c6c70; text-align: center; padding: 0 40px; direction: rtl; line-height: 1.5; }

  .done-choice-box {
    margin-top: 32px;
    background: #fff;
    border-radius: 14px;
    padding: 18px 32px;
    direction: rtl;
    text-align: center;
    width: calc(100% - 60px);
  }
  .choice-label { font-size: 13px; color: #8e8e93; margin-bottom: 6px; }
  .choice-value { font-size: 22px; font-weight: 700; color: #007aff; }

  .reset-btn {
    margin-top: 36px;
    background: #007aff;
    color: #fff;
    border: none;
    border-radius: 14px;
    padding: 16px 48px;
    font-size: 17px;
    font-weight: 600;
    font-family: -apple-system, sans-serif;
    cursor: pointer;
  }
  .reset-btn:active { filter: brightness(0.88); }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    15% { transform: translateX(-9px); }
    30% { transform: translateX(9px); }
    45% { transform: translateX(-6px); }
    60% { transform: translateX(6px); }
    75% { transform: translateX(-3px); }
    90% { transform: translateX(3px); }
  }
  .shake { animation: shake 0.45s ease; }

  /* ===== ACTION SHEET ===== */
  #screen-options { background: transparent; justify-content: flex-end; }

  .sheet-backdrop {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.35);
  }

  .passcode-behind {
    position: absolute;
    top: 0; left: 0; right: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 120px;
    filter: blur(1px);
    opacity: 0.6;
  }
  .passcode-title-behind {
    font-size: 17px;
    font-weight: 500;
    color: #000;
    text-align: center;
    margin-bottom: 40px;
    padding: 0 40px;
    direction: rtl;
    line-height: 1.5;
  }
  .dots-behind { display: flex; gap: 20px; }
  .dot-b {
    width: 14px; height: 14px;
    border: 2px solid #8e8e93;
    border-radius: 50%;
  }
  .dot-b.filled { background: #000; border-color: #000; }

  .bottom-btns-behind {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 0 20px 30px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    opacity: 0.4;
    pointer-events: none;
  }
  .behind-btn {
    background: #c7c7cc;
    border-radius: 14px;
    padding: 16px;
    text-align: center;
    font-size: 17px;
    color: #3c3c43;
    font-weight: 500;
    direction: rtl;
  }

  .action-sheet {
    position: relative;
    z-index: 10;
    width: calc(100% - 16px);
    margin: 0 8px 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    animation: slideUp 0.28s cubic-bezier(0.32, 0.72, 0, 1);
  }
  @keyframes slideUp {
    from { transform: translateY(100%); opacity: 0; }
    to   { transform: translateY(0);   opacity: 1; }
  }

  .sheet-handle {
    width: 36px; height: 5px;
    background: #007aff;
    border-radius: 3px;
    margin: 0 auto 4px;
  }

  .sheet-btn {
    width: 100%;
    background: #fff;
    border: none;
    border-radius: 14px;
    padding: 17px 20px;
    font-size: 20px;
    font-weight: 400;
    color: #007aff;
    font-family: -apple-system, 'SF Pro Display', sans-serif;
    direction: rtl;
    text-align: center;
    cursor: pointer;
    transition: background 0.1s;
  }
  .sheet-btn:active { background: #f0f0f5; }
  .sheet-btn.cancel {
    font-weight: 600;
    color: #007aff;
    margin-top: 0;
  }
</style>
</head>
<body>

  <!-- SCREEN 1: PASSCODE -->
  <div class="screen" id="screen-passcode">
    <button class="close-btn" onclick="resetAll()">✕</button>
    <div class="passcode-title">יש להזין את קוד הגישה עבור "זמן מסך"</div>
    <div class="passcode-dots" id="dots">
      <div class="dot" id="d0"></div>
      <div class="dot" id="d1"></div>
      <div class="dot" id="d2"></div>
      <div class="dot" id="d3"></div>
    </div>
    <div class="ios-keyboard">
      <div class="keyboard-grid">
        <div class="key-btn num" onclick="pressKey('1')"><div class="key-num-inner"><span class="key-number">1</span></div></div>
        <div class="key-btn num" onclick="pressKey('2')"><div class="key-num-inner"><span class="key-number">2</span><span class="key-letters">ABC</span></div></div>
        <div class="key-btn num" onclick="pressKey('3')"><div class="key-num-inner"><span class="key-number">3</span><span class="key-letters">DEF</span></div></div>
        <div class="key-btn num" onclick="pressKey('4')"><div class="key-num-inner"><span class="key-number">4</span><span class="key-letters">GHI</span></div></div>
        <div class="key-btn num" onclick="pressKey('5')"><div class="key-num-inner"><span class="key-number">5</span><span class="key-letters">JKL</span></div></div>
        <div class="key-btn num" onclick="pressKey('6')"><div class="key-num-inner"><span class="key-number">6</span><span class="key-letters">MNO</span></div></div>
        <div class="key-btn num" onclick="pressKey('7')"><div class="key-num-inner"><span class="key-number">7</span><span class="key-letters">PQRS</span></div></div>
        <div class="key-btn num" onclick="pressKey('8')"><div class="key-num-inner"><span class="key-number">8</span><span class="key-letters">TUV</span></div></div>
        <div class="key-btn num" onclick="pressKey('9')"><div class="key-num-inner"><span class="key-number">9</span><span class="key-letters">WXYZ</span></div></div>
        <div class="key-btn empty"></div>
        <div class="key-btn num" onclick="pressKey('0')"><div class="key-num-inner"><span class="key-number">0</span></div></div>
        <div class="key-btn del" onclick="deleteLast()">⌫</div>
      </div>
    </div>
  </div>

  <!-- SCREEN 2: ACTION SHEET -->
  <div class="screen hidden" id="screen-options">
    <!-- dimmed background -->
    <div class="sheet-backdrop"></div>
    <!-- passcode screen blurred behind -->
    <div class="passcode-behind">
      <div class="passcode-title-behind">יש להזין את קוד הגישה עבור "זמן מסך"</div>
      <div class="dots-behind">
        <div class="dot-b filled"></div>
        <div class="dot-b filled"></div>
        <div class="dot-b filled"></div>
        <div class="dot-b filled"></div>
      </div>
    </div>
    <!-- Action Sheet -->
    <div class="action-sheet">
      <div class="sheet-handle"></div>
      <button class="sheet-btn" onclick="chooseOption('רבע שעה')">רבע שעה</button>
      <button class="sheet-btn" onclick="chooseOption('שעה')">שעה</button>
      <button class="sheet-btn cancel" onclick="resetAll()">ביטול</button>
    </div>
    <!-- bottom buttons dimmed -->
    <div class="bottom-btns-behind">
      <div class="behind-btn">אישור</div>
      <div class="behind-btn">בקשת זמן נוסף</div>
    </div>
  </div>

  <!-- SCREEN 3: DONE -->
  <div class="screen hidden" id="screen-done">
    <div class="done-icon">✓</div>
    <div class="done-title">אושר בהצלחה!</div>
    <div class="done-subtitle">הוספת זמן ל-ChatGPT אושרה</div>
    <div class="done-choice-box">
      <div class="choice-label">זמן שנבחר</div>
      <div class="choice-value" id="chosen-time-display">—</div>
    </div>
    <button class="reset-btn" onclick="resetAll()">התחל מחדש</button>
  </div>

<script>
  let enteredCode = '';

  function pressKey(num) {
    if (enteredCode.length >= 4) return;
    enteredCode += num;
    updateDots();
    if (enteredCode.length === 4) setTimeout(checkCode, 220);
  }

  function deleteLast() {
    enteredCode = enteredCode.slice(0, -1);
    updateDots();
  }

  function updateDots() {
    for (let i = 0; i < 4; i++)
      document.getElementById('d' + i).classList.toggle('filled', i < enteredCode.length);
  }

  function checkCode() {
    // Any 4-digit code always works
    enteredCode = '';
    updateDots();
    showScreen('screen-options');
  }

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
  }

  function chooseOption(label) {
    document.getElementById('chosen-time-display').textContent = label;
    showScreen('screen-done');
  }

  function resetAll() {
    enteredCode = '';
    updateDots();
    showScreen('screen-passcode');
  }
</script>
</body>
</html>
